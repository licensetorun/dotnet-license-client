name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build src/Licensetorun.LicenseClient.csproj -c Release

      - name: Test
        run: dotnet test tests/Licensetorun.LicenseClient.Tests.csproj -c Release
